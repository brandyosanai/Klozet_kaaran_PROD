<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details | KLOZET KAARAN</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@600;800;900&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <style>
    .product-main-img { width: 100%; height: auto; background: var(--color-surface); object-fit: cover; border: 1px solid rgba(255,255,255,0.05); }
    .thumb-img { width: 100%; height: 80px; object-fit: cover; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; border: 1px solid rgba(255,255,255,0.05); }
    .thumb-img.active, .thumb-img:hover { opacity: 1; border-color: var(--color-primary); }
    .size-btn { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); font-weight: 600; padding: 0.5rem 1.25rem; transition: all 0.2s; }
    .size-btn.active, .size-btn:hover { background: #fff; color: #000; border-color: #fff; }
  </style>
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>
  <div id="cursorDot" aria-hidden="true" style="position:fixed;width:8px;height:8px;background:#f58220;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform 0.15s ease,opacity 0.15s ease;"></div>

  <main class="container py-5" style="margin-top: 134px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <a href="services.html" class="text-decoration-none text-muted d-inline-flex align-items-center gap-2">
        <span class="material-symbols-outlined">arrow_back</span> BACK TO COLLECTIONS
      </a>
      <div class="d-flex align-items-center gap-3">
        <button id="kkWishlistBtn" style="background:none;border:none;color:#fff;cursor:pointer;position:relative;" aria-label="Saved items">
          <span class="material-symbols-outlined" style="font-size:24px;">bookmark_border</span>
          <span class="kk-badge" id="kkWishlistBadge">0</span>
        </button>
        <button id="kkCartBtn" style="background:none;border:none;color:#fff;cursor:pointer;position:relative;" aria-label="Cart">
          <span class="material-symbols-outlined" style="font-size:24px;">shopping_cart</span>
          <span class="kk-badge" id="kkCartBadge">0</span>
        </button>
      </div>
    </div>

    <div class="row g-5">
      <div class="col-md-6">
        <img id="mainProductImage" src="" alt="Product view" class="product-main-img mb-3" />
        <div class="row g-2" id="thumbnailRow">
          </div>
      </div>

      <div class="col-md-6 d-flex flex-column justify-content-between">
        <div>
          <div class="d-flex justify-content-between align-items-start">
            <span class="text-uppercase tracking-widest text-muted small" id="productCategory">DROP COLLECTION</span>
            <button id="productBookmarkBtn" class="kk-bookmark" style="position:static;" aria-label="Save for later">
              <span class="material-symbols-outlined">bookmark_border</span>
            </button>
          </div>
          <h1 class="display-5 font-headline fw-black text-uppercase mt-1 mb-2" id="productTitle">LOADING...</h1>
          <h2 class="h3 text-primary fw-bold mb-4" id="productPrice">₹0</h2>

          <p class="text-secondary mb-4" style="line-height: 1.7;" id="productDesc">Loading details...</p>

          <div class="mb-4">
            <p class="fw-bold tracking-widest small mb-2">SELECT SIZE</p>
            <div class="d-flex gap-2" id="sizeContainer"></div>
          </div>

          <div class="mb-4">
            <p class="fw-bold tracking-widest small mb-2">SELECT COLOR — <span id="selectedColorName"></span></p>
            <div class="d-flex gap-2" id="colorContainer"></div>
          </div>

          <div class="mb-5">
            <p class="fw-bold tracking-widest small mb-2">QUANTITY</p>
            <div class="kk-qty-stepper">
              <button class="kk-qty-btn" id="pdQtyMinus" aria-label="Decrease quantity">−</button>
              <span id="pdQtyValue">1</span>
              <button class="kk-qty-btn" id="pdQtyPlus" aria-label="Increase quantity">+</button>
            </div>
          </div>
        </div>

        <div>
          <button id="addToCartBtn" class="btn btn-kk-primary w-100 py-3 text-center d-flex align-items-center justify-content-center gap-2 fw-bold text-uppercase tracking-widest" style="background: var(--color-primary); color:#000; border:none;">
            ADD TO CART <span class="material-symbols-outlined">shopping_cart</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/products-data.js"></script>
  <script src="assets/js/stock-sync.js"></script>
  <script src="assets/js/cart.js"></script>
  <script>
    // Parse which product to show from the URL, e.g. product-detail.html?product=urban-zen
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('product') || 'heavyweight-tee';
    const product = (window.KK_PRODUCTS || {})[productId];

    let selectedSize = null;
    let selectedColor = null;

    if (product) {
      document.getElementById('productTitle').innerText = product.title;
      document.getElementById('productPrice').innerText = '₹' + product.price.toLocaleString('en-IN');
      document.getElementById('productCategory').innerText = product.category;
      document.getElementById('productDesc').innerText = product.desc;

      // Main image + thumbnails
      document.getElementById('mainProductImage').src = product.images[0];
      const thumbRow = document.getElementById('thumbnailRow');
      product.images.forEach((imgSrc, index) => {
        const col = document.createElement('div');
        col.className = 'col-3';
        col.innerHTML = `<img src="${imgSrc}" class="thumb-img ${index === 0 ? 'active' : ''}" onclick="changeImage(this)" />`;
        thumbRow.appendChild(col);
      });

      // Size buttons — built from this product's own size list
      selectedSize = product.sizes[0];
      const sizeContainer = document.getElementById('sizeContainer');
      product.sizes.forEach((size, i) => {
        const btn = document.createElement('button');
        btn.className = 'size-btn' + (i === 0 ? ' active' : '');
        btn.textContent = size;
        btn.addEventListener('click', () => {
          sizeContainer.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedSize = size;
        });
        sizeContainer.appendChild(btn);
      });

      // Color swatches — built from this product's own color list
      selectedColor = product.colors[0].name;
      document.getElementById('selectedColorName').textContent = selectedColor;
      const colorContainer = document.getElementById('colorContainer');
      product.colors.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className = 'kk-color-swatch' + (i === 0 ? ' active' : '');
        btn.style.background = color.hex;
        btn.title = color.name;
        btn.addEventListener('click', () => {
          colorContainer.querySelectorAll('.kk-color-swatch').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedColor = color.name;
          document.getElementById('selectedColorName').textContent = selectedColor;
        });
        colorContainer.appendChild(btn);
      });

      // Quantity stepper
      let qty = 1;
      document.getElementById('pdQtyMinus').addEventListener('click', () => {
        qty = Math.max(1, qty - 1);
        document.getElementById('pdQtyValue').textContent = qty;
      });
      document.getElementById('pdQtyPlus').addEventListener('click', () => {
        qty += 1;
        document.getElementById('pdQtyValue').textContent = qty;
      });

      // Add to Cart — hands off to the shared cart engine (assets/js/cart.js),
      // which opens the cart drawer and (eventually) builds the WhatsApp message.
      document.getElementById('addToCartBtn').addEventListener('click', () => {
        window.KKCartAPI.addToCart(productId, selectedSize, selectedColor, qty);
      });

      // Bookmark toggle for this specific product page
      const bookmarkBtn = document.getElementById('productBookmarkBtn');
      function refreshBookmarkIcon() {
        const saved = window.KKCartAPI.isSaved(productId);
        bookmarkBtn.classList.toggle('active', saved);
        bookmarkBtn.querySelector('.material-symbols-outlined').textContent = saved ? 'bookmark' : 'bookmark_border';
      }
      bookmarkBtn.addEventListener('click', () => {
        window.KKCartAPI.toggleSaved(productId);
        refreshBookmarkIcon();
      });
      refreshBookmarkIcon();

    } else {
      document.getElementById('productTitle').innerText = 'PRODUCT NOT FOUND';
      document.getElementById('productDesc').innerText = 'This item may have been removed. Head back to Collections to keep browsing.';
    }

    // Thumbnail swap handler
    function changeImage(element) {
      document.getElementById('mainProductImage').src = element.src;
      document.querySelectorAll('.thumb-img').forEach(img => img.classList.remove('active'));
      element.classList.add('active');
    }

    // Once stock-sync.js has pulled the admin-managed catalog (see
    // assets/js/stock-sync.js), re-check this specific product for
    // price changes, stock, or removal — the page above already
    // rendered from the bundled defaults so it's never blank while
    // that fetch is in flight.
    document.addEventListener('kk:productsReady', () => {
      const liveProduct = (window.KK_PRODUCTS || {})[productId];
      const addBtn = document.getElementById('addToCartBtn');

      if (!liveProduct || liveProduct.active === false) {
        document.getElementById('productTitle').innerText = 'PRODUCT NOT FOUND';
        document.getElementById('productDesc').innerText = 'This item may have been removed. Head back to Collections to keep browsing.';
        if (addBtn) { addBtn.disabled = true; addBtn.style.opacity = '0.4'; addBtn.style.pointerEvents = 'none'; }
        return;
      }

      const priceEl = document.getElementById('productPrice');
      if (priceEl && typeof liveProduct.price === 'number') {
        priceEl.innerText = '₹' + liveProduct.price.toLocaleString('en-IN');
      }

      const outOfStock = typeof liveProduct.stock === 'number' && liveProduct.stock <= 0;
      if (addBtn) {
        addBtn.disabled = outOfStock;
        addBtn.style.opacity = outOfStock ? '0.4' : '';
        addBtn.style.pointerEvents = outOfStock ? 'none' : '';
        addBtn.innerText = outOfStock ? 'SOLD OUT' : addBtn.innerText === 'SOLD OUT' ? 'Add to Cart' : addBtn.innerText;
      }
    });
  </script>

  <script src="assets/js/gsap.js"></script>
</body>
</html>
